<div id="projets">

    <h3 id="titre">Parcours</h3>

    <div id="carrousel">
    <div class="carousel-track">
        @for (card of visibleCards; track card.id) {
        <div
            class="carousel-card"
            [class.active]="card.position === 0"
            [class.side-1]="card.position === 1 || card.position === -1"
            [class.side-2]="card.position === 2 || card.position === -2"
            (click)="goTo(card.position)"
        >
            <ng-container *ngTemplateOutlet="cardTemplates[card.index]" />
        </div>
        }
    </div>
    </div>

    <!-- =============================================
        EDITEZ VOS CARDS ICI
        ============================================= -->
